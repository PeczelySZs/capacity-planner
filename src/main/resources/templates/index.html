<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Capacity Planner - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Kapacitás Tervező - Q1-Q34 Előrejelzés</h2>
    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Department #</th>
                    <th th:each="q : ${#numbers.sequence(1, 34)}" th:text="'Q' + ${q}"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row, iter : ${results}">
                    <td th:text="'Részleg ' + (${iter.index} + 1)"></td>
                    <td th:each="val : ${row}" th:text="${#numbers.formatDecimal(val, 1, 2)}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
